name: Microservice CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # Backend Build Verification
  backend-build:
    name: Build Spring Boot Backend
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      run: chmod +x notification_service/gradlew

    - name: Build and Test Backend
      run: |
        cd notification_service
        ./gradlew build --no-daemon

    - name: Verify Backend Docker Build
      run: |
        cd notification_service
        docker build -t notification-service:test .

  # Frontend Build Verification
  frontend-build:
    name: Build React Frontend
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        cd notification-ui
        npm ci

    - name: Build Frontend
      run: |
        cd notification-ui
        npm run build

    - name: Verify Frontend Docker Build
      run: |
        cd notification-ui
        docker build -t notification-ui:test .
