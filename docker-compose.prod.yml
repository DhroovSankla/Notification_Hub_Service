version: '3.8'

services:
  # Database for Student Registry (MySQL)
  mysql:
    image: mysql:8.0
    container_name: prod-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: student_registry_db
    ports:
      - "3306:3306"
    networks:
      - app-network
    restart: always

  # In-Memory Cache (Redis)
  redis:
    image: redis:7.2-alpine
    container_name: prod-redis
    ports:
      - "6379:6379"
    networks:
      - app-network
    restart: always

  # ZooKeeper Coordinator for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: prod-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - app-network

  # Kafka Message Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: prod-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - app-network

  # App 1 - Registry Service Backend
  registry-service:
    build:
      context: ../StudentRegistryService/registry_service
      dockerfile: Dockerfile
    container_name: prod-registry-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/student_registry_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - APP_JWT_SECRET=zK4W7X9vN2mP5rQ8sT1uW4xZ7aC0eR3tY6uI9oP2aS5dF8gH1jK4lN7qR0wT3yU6
    depends_on:
      - mysql
      - kafka
    networks:
      - app-network
    restart: on-failure

  # App 2 - Notification Service Backend
  notification-service:
    build:
      context: ./notification_service
      dockerfile: Dockerfile
    container_name: prod-notification-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - APP_JWT_SECRET=zK4W7X9vN2mP5rQ8sT1uW4xZ7aC0eR3tY6uI9oP2aS5dF8gH1jK4lN7qR0wT3yU6
    depends_on:
      - redis
      - kafka
    networks:
      - app-network
    restart: on-failure

  # React UI Frontend served via Nginx
  notification-ui:
    build:
      context: ./notification-ui
      dockerfile: Dockerfile
    container_name: prod-notification-ui
    ports:
      - "80:80"
    depends_on:
      - registry-service
      - notification-service
    networks:
      - app-network
    restart: always

networks:
  app-network:
    driver: bridge
