spring.application.name=notification_service


# Server Port Configuration
server.port=8082

# =========================================================================
# Distributed In-Memory Caching Tier Configuration (Redis)
# =========================================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# =========================================================================
# Asynchronous Distributed Messaging Broker Configuration (Apache Kafka)
# =========================================================================
spring.kafka.bootstrap-servers=${KAFKA_BROKERS:localhost:9092}
spring.kafka.consumer.group-id=notification-hub-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# FIXED: Static JWT Cryptographic Signing Secret (Must be at least 256-bits / 32 characters)
app.jwt.secret=${JWT_SECRET}

# =========================================================================
# Immutable Audit Trail relational database (H2 Database)
# =========================================================================
spring.datasource.url=jdbc:h2:mem:auditdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update